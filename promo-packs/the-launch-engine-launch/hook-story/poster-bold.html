<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Archivo+Black&family=Kaushan+Script&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#ff2630;--red2:#c20812;--gold1:#f7e7b0;--gold2:#d8a23a;--ink:#f4f1ee;--mut:#b9b2ad}
#poster{width:1080px;height:1920px;position:relative;overflow:hidden;background:#0a0809;font-family:'Archivo',sans-serif;color:var(--ink)}
.glow{position:absolute;border-radius:50%;filter:blur(40px);opacity:.9;pointer-events:none}
.floor{position:absolute;left:0;right:0;bottom:0;height:500px;background:radial-gradient(120% 100% at 50% 100%, rgba(0,174,239,.22), transparent 60%),linear-gradient(0deg,#0a0e16 0%, transparent 100%)}
.grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(transparent 49px,rgba(0,174,239,.5) 50px),linear-gradient(90deg,transparent 49px,rgba(0,174,239,.5) 50px);background-size:50px 50px;mask:radial-gradient(80% 60% at 50% 40%, #000, transparent 75%);-webkit-mask:radial-gradient(80% 60% at 50% 40%, #000, transparent 75%)}
.laser{position:absolute;height:3px;background:linear-gradient(90deg,transparent,var(--red),#fff,var(--red),transparent);box-shadow:0 0 16px 2px rgba(0,174,239,.9);border-radius:3px}
.wrap{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;padding:58px 70px 60px}
.core{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
.brandrow{display:flex;justify-content:center;gap:14px;align-items:center;font-family:'Poppins';font-weight:600;letter-spacing:.3em;font-size:23px;color:var(--mut);text-transform:uppercase;flex-wrap:wrap}
.brandrow b{color:var(--red)}
.head{margin-top:28px;text-align:center}
.head .l1{font-family:'Archivo Black';font-size:100px;line-height:.92;letter-spacing:-1px}
.head .l1 .go{color:var(--red);text-shadow:0 0 24px rgba(0,174,239,.6)}
.script{font-family:'Kaushan Script';color:var(--red);line-height:.85;text-shadow:0 0 26px rgba(0,174,239,.7),0 0 4px rgba(255,255,255,.4)}
.head .script{font-size:90px;margin-top:8px}
.hero{margin:30px auto 0;width:600px;transform:rotate(-2.4deg);position:relative}
.hero .frame{background:#f4f1ee;padding:18px 18px 22px;border-radius:6px;box-shadow:0 40px 80px rgba(0,0,0,.7),0 0 60px rgba(0,174,239,.25)}
.hero .im{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:3px}
.tag{position:absolute;top:-24px;left:-24px;transform:rotate(-6deg);background:#0a0809;border:1.5px solid var(--red);color:#fff;font-family:'Poppins';font-weight:700;letter-spacing:.18em;font-size:23px;padding:13px 24px;border-radius:14px;box-shadow:0 0 22px rgba(0,174,239,.7);text-transform:uppercase}
.sec{font-family:'Poppins';font-weight:700;letter-spacing:.22em;text-transform:uppercase;font-size:25px;text-align:center;margin-top:40px;color:#fff;display:flex;align-items:center;justify-content:center;gap:18px}
.sec .ln{height:2px;width:60px;background:linear-gradient(90deg,transparent,var(--red))}
.sec .ln.r{transform:scaleX(-1)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:26px}
.card{display:flex;align-items:center;gap:18px;padding:24px 22px;border:1.5px solid rgba(0,174,239,.55);border-radius:18px;background:linear-gradient(180deg,rgba(0,174,239,.08),rgba(0,174,239,.02));box-shadow:0 0 22px rgba(0,174,239,.28),inset 0 0 22px rgba(0,174,239,.10)}
.card .ic{flex:0 0 52px;height:52px;border-radius:50%;border:1.5px solid var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,174,239,.6)}
.card .ic svg{width:28px;height:28px;stroke:var(--red);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.card .t{font-family:'Archivo';font-weight:800;font-size:28px;color:#fff;line-height:1.04}
.card .d{font-family:'Archivo';font-weight:600;font-size:23px;color:var(--mut);line-height:1.18;margin-top:4px}
.price{margin-top:38px;border:1.5px solid rgba(0,174,239,.6);border-radius:22px;padding:28px 40px;background:linear-gradient(180deg,rgba(0,174,239,.10),rgba(0,0,0,.2));box-shadow:0 0 30px rgba(0,174,239,.3);display:flex;align-items:center;justify-content:center;gap:30px}
.price .lab{font-family:'Poppins';font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:23px;color:var(--mut);text-align:right;line-height:1.25}
.price .was{font-family:'Archivo';font-weight:700;font-size:38px;color:var(--mut);text-decoration:line-through;text-decoration-color:var(--red)}
.price .now{font-family:'Archivo Black';font-size:140px;line-height:.8;background:linear-gradient(180deg,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 10px rgba(216,162,58,.5))}
.cta{margin-top:34px;text-align:center;font-family:'Archivo Black';font-size:52px;letter-spacing:1px;color:#fff;padding:28px;border-radius:999px;background:linear-gradient(100deg,var(--red),var(--red2));box-shadow:0 0 40px rgba(0,174,239,.7),inset 0 2px 0 rgba(255,255,255,.25);text-transform:uppercase}
.foot{text-align:center;font-family:'Kaushan Script';font-size:42px;color:var(--ink);padding-top:30px;opacity:.92}
/* hook type */
.hook{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hook .big{font-family:'Archivo Black';font-size:128px;line-height:.94;letter-spacing:-1px;color:#fff}
.hook .big .go{color:var(--red);text-shadow:0 0 26px rgba(0,174,239,.6)}
.hook .scr{font-family:'Kaushan Script';font-size:128px;color:var(--red);line-height:.9;margin-top:6px;text-shadow:0 0 30px rgba(0,174,239,.7)}
.hook .rule{width:120px;height:3px;background:var(--red);border-radius:3px;margin:46px 0;box-shadow:0 0 16px rgba(0,174,239,.8)}
.hook .sub{font-family:'Archivo';font-weight:600;font-size:40px;color:var(--mut);max-width:760px;line-height:1.4}
/* before/after */
.ba{display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;align-content:center;margin-top:36px}
.bacol{border:1.5px solid rgba(0,174,239,.5);border-radius:20px;padding:34px 30px;background:linear-gradient(180deg,rgba(0,174,239,.06),transparent)}
.bacol.after{border-color:rgba(216,162,58,.6);background:linear-gradient(180deg,rgba(216,162,58,.08),transparent)}
.bah{font-family:'Archivo Black';font-size:44px;text-transform:uppercase;margin-bottom:22px;color:var(--mut)}
.bah.aft{background:linear-gradient(180deg,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.baitem{font-family:'Archivo';font-weight:600;font-size:29px;color:var(--ink);display:flex;gap:14px;margin:16px 0;line-height:1.16}
.baitem .dot{color:var(--red);font-weight:900;flex:0 0 auto}
.bacol.after .baitem .dot{color:var(--gold2)}
/* steps */
.steps{flex:1;display:flex;flex-direction:column;justify-content:center;gap:34px;margin-top:24px}
.step{display:flex;align-items:center;gap:30px}
.step .n{font-family:'Archivo Black';font-size:120px;line-height:.8;background:linear-gradient(180deg,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;flex:0 0 140px;text-align:center}
.step .sl{font-family:'Archivo';font-weight:800;font-size:46px;color:#fff;text-transform:uppercase;line-height:1.02}
.step .sd{font-family:'Archivo';font-weight:500;font-size:26px;color:var(--mut);margin-top:6px;line-height:1.2}
/* testimonial */
.testi{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.testi .qm{font-family:'Archivo Black';font-size:200px;color:var(--red);line-height:.55;opacity:.45;text-shadow:0 0 30px rgba(0,174,239,.5)}
.testi .q{font-family:'Archivo';font-weight:700;font-size:56px;color:#fff;line-height:1.26;max-width:860px;margin-top:4px}
.testi .stars{color:var(--gold2);font-size:46px;letter-spacing:10px;margin-top:38px}
.testi .by{font-family:'Kaushan Script';font-size:54px;color:var(--red);margin-top:24px;text-shadow:0 0 24px rgba(0,174,239,.6)}
#poster.feed .ba{margin-top:22px;gap:16px}#poster.feed .bacol{padding:24px 22px}#poster.feed .bah{font-size:34px;margin-bottom:14px}#poster.feed .baitem{font-size:27px;margin:12px 0}
#poster.feed .steps{gap:22px}#poster.feed .step .n{font-size:92px;flex-basis:110px}#poster.feed .step .sl{font-size:38px}
#poster.feed .testi .qm{font-size:150px}#poster.feed .testi .q{font-size:46px}
/* feed tightening */
#poster.feed .head .l1{font-size:84px}
#poster.feed .head .script{font-size:72px}
#poster.feed .hero{width:440px;margin-top:22px}
#poster.feed .sec{margin-top:26px}
#poster.feed .cards{gap:14px;margin-top:18px}
#poster.feed .card{padding:18px}
#poster.feed .price{margin-top:24px;padding:20px 32px}
#poster.feed .price .now{font-size:108px}
#poster.feed .cta{margin-top:22px;font-size:44px;padding:22px}
#poster.feed .foot{font-size:34px;padding-top:18px}
#poster.feed .hook .big{font-size:104px}
#poster.feed .hook .scr{font-size:104px}
/* === TikTok motion — only active when #poster has .anim (video render); static PNG render never adds it === */
#poster.anim .brandrow,#poster.anim .head,#poster.anim .hook,#poster.anim .hero,#poster.anim .sec,#poster.anim .cards,#poster.anim .ba,#poster.anim .steps,#poster.anim .testi,#poster.anim .price,#poster.anim .cta,#poster.anim .foot{opacity:0}
#poster.anim .brandrow{animation:riseIn .7s cubic-bezier(.2,.75,.25,1) .05s forwards}
#poster.anim .head{animation:riseIn .8s cubic-bezier(.2,.75,.25,1) .2s forwards}
#poster.anim .hook{animation:riseIn .85s cubic-bezier(.2,.75,.25,1) .3s forwards}
#poster.anim .testi{animation:riseIn .85s cubic-bezier(.2,.75,.25,1) .35s forwards}
#poster.anim .hero{animation:heroIn .9s cubic-bezier(.2,.75,.25,1) .5s forwards;will-change:transform}
#poster.anim .ba{animation:riseIn .8s cubic-bezier(.2,.75,.25,1) .6s forwards}
#poster.anim .steps{animation:riseIn .8s cubic-bezier(.2,.75,.25,1) .6s forwards}
#poster.anim .sec{animation:riseIn .7s cubic-bezier(.2,.75,.25,1) .8s forwards}
#poster.anim .cards{animation:riseIn .7s cubic-bezier(.2,.75,.25,1) .95s forwards}
#poster.anim .price{animation:pop .85s cubic-bezier(.2,.8,.2,1) 1.15s forwards}
#poster.anim .cta{animation:riseIn .7s cubic-bezier(.2,.75,.25,1) 1.4s forwards, ctaGlow 2.2s ease-in-out 2.2s infinite}
#poster.anim .foot{animation:riseIn .7s cubic-bezier(.2,.75,.25,1) 1.6s forwards}
#poster.anim .glow{animation:glowPulse 3.4s ease-in-out infinite}
#poster.anim .laser{animation:laserFlicker 2.8s ease-in-out infinite}
@keyframes riseIn{from{opacity:0;transform:translateY(48px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroIn{from{opacity:0;transform:rotate(-2.4deg) translateY(42px) scale(.93)}to{opacity:1;transform:rotate(-2.4deg) translateY(0) scale(1)}}
@keyframes pop{0%{opacity:0;transform:scale(.82)}65%{opacity:1;transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes ctaGlow{0%,100%{box-shadow:0 0 40px rgba(0,174,239,.7),inset 0 2px 0 rgba(255,255,255,.25);transform:scale(1)}50%{box-shadow:0 0 74px rgba(0,174,239,1),inset 0 2px 0 rgba(255,255,255,.3);transform:scale(1.02)}}
@keyframes glowPulse{0%,100%{opacity:.72}50%{opacity:1}}
@keyframes laserFlicker{0%,100%{opacity:.8}50%{opacity:1}}
</style></head>
<body>
<div id="poster"></div>
<script>
const ICONS={funnel:'<path d="M3 4h18l-7 8v6l-4 2v-8z"/>',page:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/>',quiz:'<circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7"/><path d="M12 17h.01"/>',store:'<path d="M4 9l1-4h14l1 4M5 9v11h14V9M4 9h16"/>',heart:'<path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/>',home:'<path d="M3 11l9-7 9 7M5 10v10h14V10"/>',ai:'<rect x="5" y="5" width="14" height="14" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/>',gpt:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M7.5 9.5l9 5M16.5 9.5l-9 5"/>',gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M4 4l2 2M18 18l2 2M2 12h3M19 12h3M4 20l2-2M18 6l2-2"/>',canva:'<circle cx="12" cy="12" r="9"/><path d="M15 9.5a3.5 3.5 0 1 0 0 5"/>',plus:'<path d="M12 5v14M5 12h14"/>',cart:'<circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.5 12h11l2-8H6"/>',laptop:'<rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M2 20h20"/>',rocket:'<path d="M5 15c-1 2-1 5-1 5s3 0 5-1M9 15l-3-3a9 9 0 0 1 9-9c2 0 3 1 3 3a9 9 0 0 1-9 9z"/>',users:'<circle cx="9" cy="9" r="3"/><path d="M3 20a6 6 0 0 1 12 0M16 7a3 3 0 0 1 0 6"/>',star:'<path d="M12 3l2.7 5.6 6.3.9-4.5 4.4 1 6.1-5.5-2.9-5.5 2.9 1-6.1L3 9.5l6.3-.9z"/>',money:'<rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/>',check:'<path d="M5 13l4 4L19 7"/>'};
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const safeUrl=u=>String(u==null?"":u).replace(/[ -"'()\\<>`]/g,"");
// Verify the hero actually loads as an image; a 404 page / non-image resolves false → frameless fallback (no blank box).
function loadImg(src){return new Promise(res=>{if(!src)return res(false);let done=false;const fin=v=>{if(!done){done=true;res(v);}};const im=new Image();im.onload=()=>fin(im.naturalWidth>1);im.onerror=()=>fin(false);im.src=src;setTimeout(()=>fin(false),6000);});}
function hl(line,word){ if(!word) return esc(line); const i=line.toLowerCase().indexOf(String(word).toLowerCase()); if(i<0) return esc(line); return esc(line.slice(0,i))+'<span class="go">'+esc(line.slice(i,i+word.length))+'</span>'+esc(line.slice(i+word.length)); }
const ATMO=`<div class="glow" style="width:680px;height:680px;background:rgba(0,174,239,.30);top:-160px;right:-180px"></div><div class="glow" style="width:560px;height:560px;background:rgba(139,92,246,.30);bottom:160px;left:-200px"></div><div class="grid"></div><div class="laser" style="width:780px;top:430px;left:-120px;transform:rotate(-18deg)"></div><div class="laser" style="width:620px;top:1180px;right:-120px;transform:rotate(-16deg);opacity:.8"></div><div class="floor"></div>`;
async function main(){
 let c; try{ c=await (await fetch('./config.json',{cache:'no-store'})).json(); }catch(e){ document.getElementById('poster').textContent='no config'; return; }
 const p=c.content||c; const acc=(c.palette&&c.palette.accent)||c.accent;
 const root=document.getElementById('poster');
 const fmt=(c.format||p.format||'story'); if(fmt==='feed'){ root.classList.add('feed'); root.style.height='1350px'; }
 if(acc){ document.documentElement.style.setProperty('--red',acc); }
 if(c.palette&&c.palette.accent2){ document.documentElement.style.setProperty('--red2',c.palette.accent2); }
 const type=c.type||p.type||'offer';
 const brandrow=`<div class="brandrow">${(p.meta||['Online','Self-Paced']).concat(p.brand?[p.brand]:[]).map(esc).join(' <b>&bull;</b> ')}</div>`;
 const NOW=esc(p.now||p.amt),WAS=esc(p.was);
 const priceHTML=NOW?`<div class="price"><div class="lab">${WAS?`Was <span class="was">${WAS}</span><br>`:''}now only</div><div class="now">${NOW}</div></div>`:'';
 const ctaHTML=`<div class="cta">${esc(p.cta||'Get it now')}</div>`;
 const footHTML=p.tagline?`<div class="foot">${esc(p.tagline)}</div>`:'';
 let mid='';
 if(type==='hook'){
   const lines=(p.headline_lines||[p.name||'']).map(l=>`<div class="big">${hl(l,p.headline_highlight)}</div>`).join('');
   const scr=p.script?`<div class="scr">${esc(p.script)}</div>`:'';
   const sub=p.sub||p.tagline?`<div class="sub">${esc(p.sub||p.tagline)}</div>`:'';
   mid=`<div class="hook">${lines}${scr}<div class="rule"></div>${sub}</div>${p.cta?ctaHTML:''}`;
 } else if(type==='features'){
   const lines=(p.headline_lines||[p.name||'']).map(l=>`<div class="l1">${hl(l,p.headline_highlight)}</div>`).join('');
   const scr=p.script?`<div class="script">${esc(p.script)}</div>`:'';
   const feats=(p.features||[]).slice(0,6).map(f=>`<div class="card"><span class="ic"><svg viewBox="0 0 24 24">${ICONS[f.icon]||ICONS.check}</svg></span><div><div class="t">${esc(f.label)}</div>${f.desc?`<div class="d">${esc(f.desc)}</div>`:''}</div></div>`).join('');
   mid=`<div class="head">${lines}${scr}</div><div class="sec"><span class="ln"></span><span>${esc(p.section||"What you'll learn")}</span><span class="ln r"></span></div><div class="cards">${feats}</div>${priceHTML}${ctaHTML}`;
 } else if(type==='beforeafter'){
   const title=(p.headline_lines&&p.headline_lines[0])||p.headline||'Before &amp; After';
   const scr=p.script?`<div class="script">${esc(p.script)}</div>`:'';
   const bl=(p.before||[]).map(x=>`<div class="baitem"><span class="dot">&times;</span><span>${esc(x)}</span></div>`).join('');
   const al=(p.after||[]).map(x=>`<div class="baitem"><span class="dot">&#10003;</span><span>${esc(x)}</span></div>`).join('');
   mid=`<div class="head"><div class="l1">${esc(title)}</div>${scr}</div><div class="ba"><div class="bacol"><div class="bah">${esc(p.before_label||'Before')}</div>${bl}</div><div class="bacol after"><div class="bah aft">${esc(p.after_label||'After')}</div>${al}</div></div>${p.cta?ctaHTML:''}`;
 } else if(type==='steps'){
   const title=(p.headline_lines&&p.headline_lines[0])||p.headline||'How it works';
   const scr=p.script?`<div class="script">${esc(p.script)}</div>`:'';
   const st=(p.steps||[]).slice(0,4).map((s,i)=>{const lab=(typeof s==='string')?s:(s.label||''); const desc=(s&&s.desc)?`<div class="sd">${esc(s.desc)}</div>`:''; const n=(s&&s.n)||(i+1); return `<div class="step"><div class="n">${esc(n)}</div><div><div class="sl">${esc(lab)}</div>${desc}</div></div>`;}).join('');
   mid=`<div class="head"><div class="l1">${esc(title)}</div>${scr}</div><div class="steps">${st}</div>${priceHTML}${p.cta?ctaHTML:''}`;
 } else if(type==='testimonial'){
   const stars='&#9733;'.repeat(Math.max(0,Math.min(5,p.stars||5)));
   mid=`<div class="testi"><div class="qm">&ldquo;</div><div class="q">${esc(p.quote||'')}</div><div class="stars">${stars}</div><div class="by">${esc(p.attribution||p.brand||'')}</div></div>${p.cta?ctaHTML:''}`;
 } else { // offer
   const lines=(p.headline_lines||[p.name||'']).map(l=>`<div class="l1">${hl(l,p.headline_highlight)}</div>`).join('');
   const scr=p.script?`<div class="script">${esc(p.script)}</div>`:'';
   const heroSrc=p.hero_image||(p.photo_urls&&p.photo_urls[0]);
   const heroOk=heroSrc?await loadImg(safeUrl(heroSrc)):false;
   const tag=p.hero_tag?`<span class="tag">${esc(p.hero_tag)}</span>`:'';
   const hero=(heroSrc&&heroOk)?`<div class="hero">${tag}<div class="frame"><div class="im" style="background-image:url('${safeUrl(heroSrc)}')"></div></div></div>`:'';
   const feats=(p.features||[]).slice(0,4).map(f=>`<div class="card"><span class="ic"><svg viewBox="0 0 24 24">${ICONS[f.icon]||ICONS.check}</svg></span><span class="t">${esc(f.label)}</span></div>`).join('');
   const cards=feats?`<div class="sec"><span class="ln"></span><span>${esc(p.section||"What you'll build")}</span><span class="ln r"></span></div><div class="cards">${feats}</div>`:'';
   mid=`<div class="head">${lines}${scr}</div>${hero}${cards}${priceHTML}${ctaHTML}`;
 }
 root.innerHTML=`${ATMO}<div class="wrap">${brandrow}<div class="core">${mid}</div>${footHTML}</div>`;
 window.__ready=true;
}
main();
</script>
</body></html>
