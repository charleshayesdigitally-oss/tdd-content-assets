<!DOCTYPE html><html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Your Promo — The Digital Dad</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0a08;color:#efe6d4;font-family:'Poppins',system-ui,sans-serif;padding:34px 20px 70px;text-align:center}
h1{font-size:24px;font-weight:700}.lede{color:#9b8f78;font-size:14px;margin:6px 0 26px}
.poster{max-width:420px;width:100%;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.6);display:block;margin:0 auto}
.dl{display:inline-block;margin-top:22px;background:linear-gradient(100deg,#f1d79a,#caa052);color:#1a1208;font-weight:600;
  border-radius:999px;padding:16px 40px;font-size:16px;text-decoration:none}
.caps{max-width:460px;margin:40px auto 0;text-align:left;background:#15110b;border:1px solid rgba(224,176,99,.18);border-radius:14px;padding:22px 24px;white-space:pre-wrap;font-size:15px;line-height:1.6;color:#d8ccbd}
.caps h2{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#caa052;margin:14px 0 6px}
.note{color:#6f6557;font-size:12px;margin-top:30px}
</style></head>
<body>
<h1 id="title">Your promo</h1>
<div class="lede" id="lede">Loading…</div>
<div id="hold"></div>
<div class="caps" id="caps" style="display:none"></div>
<div class="note">Built by The Digital Dad. One round of tweaks included — just reply to your delivery email.</div>
<script>
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const safe=u=>String(u==null?"":u).replace(/[ -"'()\\<>`]/g,"");
(async()=>{
 let c={}; try{ c=await (await fetch('./config.json',{cache:'no-store'})).json(); }catch(e){}
 const style=(c.style)|| (c.content&&c.content.style) || 'bold';
 const name=(c.content&&c.content.name)||(c.content&&(c.content.headline_lines||[])[0])||'Your promo';
 document.getElementById('title').textContent=name+' — promo';
 document.getElementById('lede').textContent='Tap the image to view, then Download.';
 const png='./poster-'+(style==='elegant'?'elegant':'bold')+'.png';
 document.getElementById('hold').innerHTML=`<a href="${png}" target="_blank"><img class="poster" src="${png}" alt="poster"/></a><div><a class="dl" href="${png}" download>Download poster</a></div>`;
 try{ const t=await (await fetch('./captions.md',{cache:'no-store'})).text();
   if(t){ const h=esc(t).replace(/^##\s*(.+)$/gm,'<h2>$1</h2>'); const el=document.getElementById('caps'); el.innerHTML='<h2>Captions</h2>'+h; el.style.display='block'; } }catch(e){}
})();
</script>
</body></html>
