<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Archivo+Black&family=Kaushan+Script&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#ff2630;--red2:#c20812;--gold1:#f7e7b0;--gold2:#d8a23a;--ink:#f4f1ee;--mut:#b9b2ad}
#poster{width:1080px;height:1920px;position:relative;overflow:hidden;background:#0a0809;font-family:'Archivo',sans-serif;color:var(--ink)}
.glow{position:absolute;border-radius:50%;filter:blur(40px);opacity:.9;pointer-events:none}
.floor{position:absolute;left:0;right:0;bottom:0;height:520px;background:radial-gradient(120% 100% at 50% 100%, rgba(255,38,48,.22), transparent 60%),linear-gradient(0deg,#140a0b 0%, transparent 100%)}
.grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(transparent 49px,rgba(255,80,80,.5) 50px),linear-gradient(90deg,transparent 49px,rgba(255,80,80,.5) 50px);background-size:50px 50px;mask:radial-gradient(80% 60% at 50% 40%, #000, transparent 75%);-webkit-mask:radial-gradient(80% 60% at 50% 40%, #000, transparent 75%)}
.laser{position:absolute;height:3px;background:linear-gradient(90deg,transparent,var(--red),#fff,var(--red),transparent);box-shadow:0 0 16px 2px rgba(255,38,48,.9);border-radius:3px}
.wrap{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;padding:58px 70px 60px}
.brandrow{display:flex;justify-content:center;gap:14px;align-items:center;font-family:'Poppins';font-weight:600;letter-spacing:.34em;font-size:21px;color:var(--mut);text-transform:uppercase;flex-wrap:wrap}
.brandrow b{color:var(--red)}
.head{margin-top:30px;text-align:center}
.head .l1{font-family:'Archivo Black';font-size:104px;line-height:.92;letter-spacing:-1px}
.head .l1 .go{color:var(--red);text-shadow:0 0 24px rgba(255,38,48,.6)}
.script{font-family:'Kaushan Script';font-size:94px;color:var(--red);line-height:.85;margin-top:8px;text-shadow:0 0 26px rgba(255,38,48,.7),0 0 4px rgba(255,255,255,.4)}
.hero{margin:34px auto 0;width:624px;transform:rotate(-2.4deg);position:relative}
.hero .frame{background:#f4f1ee;padding:18px 18px 22px;border-radius:6px;box-shadow:0 40px 80px rgba(0,0,0,.7),0 0 60px rgba(255,38,48,.25)}
.hero img{width:100%;display:block;border-radius:3px}
.tag{position:absolute;top:-26px;left:-26px;transform:rotate(-6deg);background:#0a0809;border:1.5px solid var(--red);color:#fff;font-family:'Poppins';font-weight:700;letter-spacing:.18em;font-size:24px;padding:14px 26px;border-radius:14px;box-shadow:0 0 22px rgba(255,38,48,.7);text-transform:uppercase}
.sec{font-family:'Poppins';font-weight:700;letter-spacing:.22em;text-transform:uppercase;font-size:26px;text-align:center;margin-top:44px;color:#fff;display:flex;align-items:center;justify-content:center;gap:18px}
.sec span{padding:0 4px}
.sec .ln{height:2px;width:64px;background:linear-gradient(90deg,transparent,var(--red))}
.sec .ln.r{transform:scaleX(-1)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:28px}
.card{display:flex;align-items:center;gap:20px;padding:26px 24px;border:1.5px solid rgba(255,38,48,.55);border-radius:18px;background:linear-gradient(180deg,rgba(255,38,48,.08),rgba(255,38,48,.02));box-shadow:0 0 22px rgba(255,38,48,.28),inset 0 0 22px rgba(255,38,48,.10)}
.card .ic{flex:0 0 56px;height:56px;border-radius:50%;border:1.5px solid var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(255,38,48,.6)}
.card .ic svg{width:30px;height:30px;stroke:var(--red);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.card .t{font-family:'Archivo';font-weight:800;font-size:30px;color:#fff;line-height:1.04}
.price{margin-top:42px;border:1.5px solid rgba(255,38,48,.6);border-radius:22px;padding:30px 40px;background:linear-gradient(180deg,rgba(255,38,48,.10),rgba(0,0,0,.2));box-shadow:0 0 30px rgba(255,38,48,.3);display:flex;align-items:center;justify-content:center;gap:30px}
.price .lab{font-family:'Poppins';font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:24px;color:var(--mut);text-align:right;line-height:1.25}
.price .was{font-family:'Archivo';font-weight:700;font-size:40px;color:var(--mut);text-decoration:line-through;text-decoration-color:var(--red)}
.price .now{font-family:'Archivo Black';font-size:150px;line-height:.8;background:linear-gradient(180deg,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 10px rgba(216,162,58,.5))}
.cta{margin-top:36px;text-align:center;font-family:'Archivo Black';font-size:54px;letter-spacing:1px;color:#fff;padding:30px;border-radius:999px;background:linear-gradient(100deg,var(--red),var(--red2));box-shadow:0 0 40px rgba(255,38,48,.7),inset 0 2px 0 rgba(255,255,255,.25);text-transform:uppercase}
.foot{margin-top:auto;text-align:center;font-family:'Kaushan Script';font-size:44px;color:var(--ink);padding-top:28px;opacity:.92}
.foot small{display:block;font-family:'Poppins';font-weight:600;letter-spacing:.3em;text-transform:uppercase;font-size:20px;color:var(--mut);margin-top:8px}
</style></head>
<body>
<div id="poster"></div>
<script>
const ICONS={
 funnel:'<path d="M3 4h18l-7 8v6l-4 2v-8z"/>',
 page:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/>',
 quiz:'<circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7"/><path d="M12 17h.01"/>',
 store:'<path d="M4 9l1-4h14l1 4M5 9v11h14V9M4 9h16"/>',
 heart:'<path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/>',
 home:'<path d="M3 11l9-7 9 7M5 10v10h14V10"/>',
 ai:'<rect x="5" y="5" width="14" height="14" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/><path d="M9 10v4M15 10v4"/>',
 gpt:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M7.5 9.5l9 5M16.5 9.5l-9 5"/>',
 gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>',
 canva:'<circle cx="12" cy="12" r="9"/><path d="M15 9.5a3.5 3.5 0 1 0 0 5"/>',
 plus:'<path d="M12 5v14M5 12h14"/>',
 cart:'<circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.5 12h11l2-8H6"/>',
 laptop:'<rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M2 20h20"/>',
 rocket:'<path d="M5 15c-1 2-1 5-1 5s3 0 5-1M9 15l-3-3a9 9 0 0 1 9-9c2 0 3 1 3 3a9 9 0 0 1-9 9z"/><circle cx="14.5" cy="9.5" r="1.3"/>',
 users:'<circle cx="9" cy="9" r="3"/><path d="M3 20a6 6 0 0 1 12 0M16 7a3 3 0 0 1 0 6M21 20a6 6 0 0 0-3-5"/>',
 star:'<path d="M12 3l2.7 5.6 6.3.9-4.5 4.4 1 6.1-5.5-2.9-5.5 2.9 1-6.1L3 9.5l6.3-.9z"/>',
 money:'<rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9v6M18 9v6"/>',
 check:'<path d="M5 13l4 4L19 7"/>'
};
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const safeUrl=u=>String(u==null?"":u).replace(/[ -"'()\\<>`]/g,"");
function hl(line,word){ if(!word) return esc(line); const i=line.toLowerCase().indexOf(String(word).toLowerCase()); if(i<0) return esc(line); return esc(line.slice(0,i))+'<span class="go">'+esc(line.slice(i,i+word.length))+'</span>'+esc(line.slice(i+word.length)); }
async function main(){
 let c; try{ c=await (await fetch('./config.json',{cache:'no-store'})).json(); }catch(e){ document.getElementById('poster').textContent='no config'; return; }
 const p=c.content||c; const acc=(c.palette&&c.palette.accent)||c.accent;
 if(acc){ document.documentElement.style.setProperty('--red',acc); }
 if(c.palette&&c.palette.accent2){ document.documentElement.style.setProperty('--red2',c.palette.accent2); }
 const meta=(p.meta||['Online','Self-Paced']).concat(p.brand?[p.brand]:[]);
 const brandrow=meta.map(esc).join(' <b>&bull;</b> ');
 const lines=(p.headline_lines||[p.name||'']).map(l=>`<div class="l1">${hl(l,p.headline_highlight)}</div>`).join('');
 const scriptHTML=p.script?`<div class="script">${esc(p.script)}</div>`:'';
 const tag=p.hero_tag?`<span class="tag">${esc(p.hero_tag)}</span>`:'';
 const heroHTML=(p.hero_image||(p.photo_urls&&p.photo_urls[0]))?`<div class="hero">${tag}<div class="frame"><img src="${safeUrl(p.hero_image||p.photo_urls[0])}" crossorigin="anonymous"/></div></div>`:'';
 const feats=(p.features||[]).slice(0,4).map(f=>`<div class="card"><span class="ic"><svg viewBox="0 0 24 24">${ICONS[f.icon]||ICONS.check}</svg></span><span class="t">${esc(f.label)}</span></div>`).join('');
 const cardsHTML=feats?`<div class="sec"><span class="ln"></span><span>${esc(p.section||"What you'll build")}</span><span class="ln r"></span></div><div class="cards">${feats}</div>`:'';
 const NOW=esc(p.now||p.amt), WAS=esc(p.was);
 const priceHTML=NOW?`<div class="price"><div class="lab">${WAS?`Was <span class="was">${WAS}</span><br>`:''}now only</div><div class="now">${NOW}</div></div>`:'';
 const footHTML=p.tagline?`<div class="foot">${esc(p.tagline)}</div>`:'';
 document.getElementById('poster').innerHTML=`
  <div class="glow" style="width:680px;height:680px;background:rgba(255,38,48,.30);top:-160px;right:-180px"></div>
  <div class="glow" style="width:560px;height:560px;background:rgba(180,10,20,.30);bottom:160px;left:-200px"></div>
  <div class="grid"></div>
  <div class="laser" style="width:780px;top:430px;left:-120px;transform:rotate(-18deg)"></div>
  <div class="laser" style="width:620px;top:1180px;right:-120px;transform:rotate(-16deg);opacity:.8"></div>
  <div class="floor"></div>
  <div class="wrap">
    <div class="brandrow">${brandrow}</div>
    <div class="head">${lines}${scriptHTML}</div>
    ${heroHTML}
    ${cardsHTML}
    ${priceHTML}
    <div class="cta">${esc(p.cta||'Get it now')}</div>
    ${footHTML}
  </div>`;
 window.__ready=true;
}
main();
</script>
</body></html>
