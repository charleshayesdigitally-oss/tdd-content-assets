name: Render posters + TikTok videos
on:
  push:
    paths:
      - 'promo-packs/**/poster-*.html'
      - 'promo-packs/**/config.json'
      - 'promo-packs/**/*.jpg'
      - 'promo-packs/**/*.png'
      - 'promo-packs/**/*.mp4'
      - 'promo-packs/**/.rerender'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: render-posters
  cancel-in-progress: false
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm init -y && npm i playwright@1.48.0
      - run: npx playwright install --with-deps chromium
      - run: node render-posters.mjs
      - run: node render-videos.mjs
      - name: Clear .rerender flags (renders are now in place)
        run: find promo-packs -name .rerender -delete || true
      - name: Commit rendered media (rebase + retry to survive concurrent pushes)
        run: |
          git config user.name "poster-renderer"
          git config user.email "render@thedigitaldad.co"
          git add -A
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "Render posters + videos [skip render]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && { echo "pushed"; exit 0; }
            echo "push retry $i"; sleep 7
          done
          echo "push failed after retries"; exit 1
