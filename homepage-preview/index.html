      ::selection { background: var(--blue); color: #001018; }

      .btn-outline:focus-visible { outline: 3px solid var(--blue); outline-offset: 4px; }
      .btn-ghost { background: transparent; color: var(--blue); padding-left: 0; padding-right: 0; font-size: 0.8rem; box-shadow: none; }
      .btn-ghost:hover { transform: none; gap: 12px; }
      .btn-ghost:focus-visible { outline: 2px solid var(--blue); outline-offset: 4px; border-radius: 3px; }

      #nav { position: fixed; top: 0; left: 0; right: 0; z-index: 5000; background: linear-gradient(180deg, rgba(5,8,22,0.95), rgba(5,8,22,0.74)) !important; border-bottom: 1px solid var(--border); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }

      .nav-links a::after { content: ''; position: absolute; left: 0; bottom: 0; height: 1.5px; width: 100%; background: var(--blue); transform: scaleX(0); transform-origin: left; transition: transform 0.35s var(--ease); }

      .proof-tile { position: relative; aspect-ratio: 4 / 5; overflow: hidden; border: 1px solid var(--border); border-radius: 14px; background: var(--card); display: block; text-decoration: none; transition: transform 0.35s var(--ease), border-color 0.3s ease, box-shadow 0.35s var(--ease); }

      .proof-foot { text-align: center; margin-top: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; letter-spacing: 0.02em; color: var(--muted); }

      /* CONTACT */
      .contact-card { max-width: 640px; margin: 0 auto; background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.008)); border: 1px solid var(--border-strong); border-radius: 18px; padding: clamp(30px,5vw,46px); position: relative; overflow: hidden; box-shadow: 0 30px 70px -36px rgba(0,0,0,0.8); }
      .contact-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--blue), var(--purple)); }
      .contact-card .crow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      @media (max-width: 560px) { .contact-card .crow { grid-template-columns: 1fr; } }
      .contact-card input, .contact-card textarea { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.9rem; padding: 13px 16px; outline: none; width: 100%; transition: border-color 0.22s, box-shadow 0.22s; margin-bottom: 12px; }

      .contact-or { text-align: center; margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); }

      /* BOTTLENECK AUDIT */

      .audit-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--blue), var(--purple)); }
      .audit-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 0.64rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--blue); border: 1px solid rgba(0,174,239,0.3); border-radius: 30px; padding: 5px 14px; margin-bottom: 18px; }
      .audit-card h3 { font-family: 'Anton', sans-serif; font-size: clamp(1.8rem,3.5vw,2.6rem); letter-spacing: 0.02em; color: #fff; margin-bottom: 14px; }
      .audit-card > p { font-size: 0.96rem; color: var(--dim); line-height: 1.7; max-width: 540px; margin: 0 auto 22px; font-weight: 300; }
      .audit-points { list-style: none; display: flex; flex-direction: column; gap: 10px; max-width: 470px; margin: 0 auto 26px; text-align: left; }
      .audit-points li { display: flex; align-items: flex-start; gap: 11px; font-size: 0.88rem; color: var(--dim); font-weight: 300; line-height: 1.5; }
      .audit-points li::before { content: ''; width: 13px; height: 13px; flex-shrink: 0; margin-top: 4px; background: var(--blue); clip-path: polygon(0 0, 100% 50%, 0 100%); }
      .audit-price { font-family: 'Anton', sans-serif; font-size: 2.6rem; color: #fff; line-height: 1; }
      .audit-price span { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--blue); margin-top: 10px; }

      /* STACK */
      .stack-row { display: grid; grid-template-columns: 78px 1fr; border-top: 1px solid var(--border); padding: 34px 0; transition: transform 0.3s var(--ease); }
